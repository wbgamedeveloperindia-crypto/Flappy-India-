<!DOCTYPE html>
<html lang="en">
<head>
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Flappy India - Indian Style</title>
    <script src="click.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script> 
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('texture.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            height: 100vh; 
            gap: 15px; 
        }

        /* --- Glassmorphism Card --- */
      .glass-card {
    width: 90%;
    max-width: 400px;
            height: 160px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px 20px; 
            box-sizing: border-box;
            color: white; 
            font-family: Arial, sans-serif;
        }
/* --- Menu Overlay Styling --- */
#menuOverlay {
    display: none; 
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 320px;
    height: auto;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 20px;
    z-index: 200;
    color: white;
    font-family: 'Arial', sans-serif;
    padding: 20px;
    box-sizing: border-box;

    /* NAYI LINE: Elements ko upar-neeche set karne ke liye */
    flex-direction: column; 
}


.menu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 30px;
}

.menu-logo {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid white;
}

.menu-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 18px;
}

/* Toggle Switch Styling */
.switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 24px;
}
.switch input { opacity: 0; width: 0; height: 0; }
.slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #ccc;
    transition: .4s;
    border-radius: 34px;
}
.slider:before {
    position: absolute;
    content: "";
    height: 16px; width: 16px;
    left: 4px; bottom: 4px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
}
input:checked + .slider { background-color: #ffcc00; }
input:checked + .slider:before { transform: translateX(26px); }

.back-btn {
    cursor: pointer;
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
}

        /* --- NAYA: Game Over Pop-up Overlay --- */
        #gameOverOverlay {
            display: none; /* Hide by default */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Center it precisely */
            width: 90%;
max-width: 320px;
            height: 300px;
            background-image: url('popup.png'); /* Custom image background */
            background-size: cover;
            background-position: center;
            border-radius: 15px; /* Optional: if popup.png isn't already rounded */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); /* Good 3D lighting effect */
            z-index: 100; /* Ensure it stays on top */
            
            /* Center the text and button inside */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white; /* Make sure text contrasts with popup.png */
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            padding-top: 50px; /* Push content down slightly depending on the image */
        }

        .popup-text {
            font-size: 16px;
            margin: 10px 0;
            font-weight: bold;
            text-shadow: 1px 1px 2px black; /* Helps text stand out */
        }

        .popup-score {
            font-size: 24px;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        .retry-btn {
            background-color: #ffcc00; /* Yellow button */
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s; /* Tiny press effect */
        }

        .retry-btn:active {
            transform: scale(0.95);
        }
        #winnerOverlay {
    display: none;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
max-width: 320px;
height: 400px;
    background-image: url('win.png'); /* Aapki Winner PNG */
    background-size: cover; background-position: center;
    border-radius: 20px;
     Greenish glow for victory */
    z-index: 150;
    flex-direction: column; justify-content: center; align-items: center;
    text-align: center; color: white; font-family: Arial, sans-serif;
    padding: 20px; box-sizing: border-box;
}


        /* Top Line: Score aur Menu button */
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .score-info {
            font-size: 18px;
            line-height: 1.4;
        }
        .menu-icon {
            font-size: 35px; 
            cursor: pointer;
            line-height: 1;
        }

        /* Middle Line: Play/Pause button */
        .card-middle {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -15px; 
        }
        .play-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            font-size: 20px;
            cursor: pointer;
            margin-bottom: 5px;
            padding-left: 4px; 
            box-sizing: border-box;
        }
        .play-text {
            font-size: 14px;
        }

        /* Bottom Line: Average aur Target */
        .card-bottom {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

                canvas {
            border: 5px solid #fff;
            border-radius: 15px;
            /* NAYA: Screen ke hisaab se khud chota hone ke liye */
            max-width: 95%; 
            max-height: 60vh; /* Screen ki height ka 60% hi lega */
            object-fit: contain; /* Aspect ratio kharab nahi hone dega */
        }

    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<div id="gameOverOverlay">
    <div class="popup-text">You tried your best my nigga but you loose</div>
    <div class="popup-score" id="popupScoreDisplay">Score: 0 | Best: 0</div>
    <button class="retry-btn" onclick="retryGame()">Retry</button>
</div>

<div id="winnerOverlay">
    <div class="popup-text">OH YEAH MY NIGGA 🏆</div>
    <div class="popup-score" id="winnerScoreDisplay">Final Score: 0</div>
    <div class="popup-text" style="font-size: 14px; margin-top: -10px;">Finally you gave me the power oh yeah🫦!</div>
    <button class="retry-btn" onclick="retryGame()" style="background-color: #2ecc71;">Play Again</button>
</div>

<div id="menuOverlay">
    <div class="menu-header">
        <h2 style="margin:0;">Flappy India</h2>
        <img src="logo.png" class="menu-logo" alt="Logo">
    </div>

    <div class="menu-item">
        <span>mute/volume</span>
        <label class="switch">
            <input type="checkbox" id="muteToggle">
            <span class="slider"></span>
        </label>
    </div>

    <div class="menu-item" onclick="window.location.href='profile.html'" style="cursor:pointer;">
        <span>visit profile</span>
        <span style="font-size:24px;">👤</span>
    </div>
        <div class="menu-item" style="flex-direction: column; align-items: flex-start; gap: 10px;">
        <div style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
            <span>set target</span>
            <input type="number" id="customTargetInput" value="50" style="width: 60px; padding: 5px; border-radius: 5px; border: none; text-align: center; font-weight: bold; background: rgba(255,255,255,0.8); color: #333; outline: none;">
        </div>
        <button onclick="updateTarget()" style="width: 100%; padding: 8px; background: #ffcc00; color: #333; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Save Target</button>
    </div>


    <div class="back-btn" onclick="toggleMenu()">
        <div style="font-size:20px;">🔙</div>
        <span>back to game</span>
    </div>
</div>

<div class="glass-card">
    <div class="card-top">
        <div class="score-info">
            <div>score : 0</div>
            <div>best : 0</div>
        </div>
        <div class="menu-icon">&#9776;</div> 
    </div>
    
    <div class="card-middle">
        <div class="play-btn">&#9654;</div> <div class="play-text">play</div>
    </div>
    
    <div class="card-bottom">
        <div>Average : 0</div>
        <div>Target : 50</div>
    </div>
</div>

<script>
  // --- AUDIO SETUP ---
const bgMusic = new Audio('Bg.mp3');
const tapSound = new Audio('Tap.mp3');
const crashSound = new Audio('popup.mp3');
const winSound = new Audio('win.mp3');

// Background music ko loop par rakho
bgMusic.loop = true;
bgMusic.volume = 0.5; // Thoda kam volume taki baki sound saaf sunai dein

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- Image Handling ---
    const birdImg = new Image();
    const pipeImg = new Image();
    const bgImg = new Image();
    let loadedCount = 0;
    const totalImages = 3;

    function imageLoaded() {
        loadedCount++;
        if (loadedCount === totalImages) {
            console.log("All images loaded. Ready to play!");
        }
    }

    birdImg.src = 'character.png'; 
    pipeImg.src = 'pillar.png';      
    bgImg.src = 'bg.png';           

    birdImg.onload = imageLoaded;
    pipeImg.onload = imageLoaded;
    bgImg.onload = imageLoaded;

    birdImg.onerror = () => console.error("Error loading character.png");
    pipeImg.onerror = () => console.error("Error loading pillar.png");
    bgImg.onerror = () => console.error("Error loading bg.png");

    // --- NAYA: Start Screen logic (Plan ke mutabik) ---
    function drawStartScreen() {
        if (bgImg.complete) {
            // Background image draw karo
            ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            
            // Uske upar ek halka black overlay daalo blur feel ke liye
            ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // "Tap the play button..." wala text (Aapke plan image ke hisaab se)
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 28px 'Arial Black', sans-serif";
            ctx.fillText("Tap the play button", canvas.width / 2, 280);
            ctx.fillText("to play the", canvas.width / 2, 320);
            ctx.fillText("fun", canvas.width / 2, 360);
        }
    }

    // Jab background load ho jaye, tab ise call karein
    bgImg.onload = () => {
        imageLoaded();
        drawStartScreen();
    };

    // --- Game Variables ---
    let frames = 0;
    let score = 0; 
    let targetScore = 30; 
    const pipes = [];
    const pipeWidth = 50;
    const gap = 150; 
    const pipeSpeed = 2; 
    const spawnRate = 135; 
    let gameLoopId; 

    // --- Game State & DOM Elements ---
    let isGamePaused = true;  
    let currentBest = 0; // Added currentBest to keep track
    
    const liveScoreText = document.querySelector('.score-info div:nth-child(1)'); 
    const bestScoreText = document.querySelector('.score-info div:nth-child(2)'); 
    const playBtn = document.querySelector('.play-btn');
    const playText = document.querySelector('.play-text');
    const menuIcon = document.querySelector('.menu-icon');

    // --- Background Scroll ---
    let bgX = 0;
    const bgSpeed = 1; 

    // --- Player (Bird) Object ---
    const bird = {
        x: 100, y: 250, 
        width: 100,  
        height: 30, 
        gravity: 0.2, velocity: 3, lift: -3,
        draw() {
            if (birdImg.complete && birdImg.naturalWidth !== 0) { 
                const imageRatio = birdImg.naturalHeight / birdImg.naturalWidth;
                this.height = this.width * imageRatio; 
                ctx.drawImage(birdImg, this.x, this.y, this.width, this.height);
            } else {
                ctx.fillStyle = '#ffcc00'; 
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        },
        update() {
            this.velocity += this.gravity;
            this.y += this.velocity;
            
            if(this.y + this.height >= canvas.height) { this.y = canvas.height - this.height; this.velocity = 0; }
            if(this.y <= 0) { this.y = 0; this.velocity = 0; }
        },
               flap() {
            this.velocity = this.lift;
            // --- NAYA: Tap sound (Glitch fix ke saath) ---
            if (!isMuted) {
                tapSound.currentTime = 0; // Ye line glitch (double sound) ko rokegi
                tapSound.play();
            }
        }

    };

    // --- Play / Pause Logic ---
    function togglePlayPause() {
        if (loadedCount < totalImages) {
            alert("Images are still loading, please wait!");
            return;
        }

        if (isGamePaused) {
            isGamePaused = false;
            playBtn.innerHTML = "&#10074;&#10074;"; // Pause icon
            playText.innerText = "pause";
            loop(); 
            if (!isMuted) bgMusic.play();
        } else {
            isGamePaused = true;
            playBtn.innerHTML = "&#9654;"; // Play icon
            playText.innerText = "play";
            cancelAnimationFrame(gameLoopId); 
            bgMusic.pause();
        }
    }

    playBtn.addEventListener('click', togglePlayPause);
    
    // Controls
    window.addEventListener('keydown', (e) => { 
        if (e.code === 'Space') {
             if (isGamePaused) {
                 togglePlayPause();
             } else {
                 bird.flap(); 
             }
        } 
    });
    window.addEventListener('mousedown', () => { if(!isGamePaused) bird.flap(); });
    window.addEventListener('touchstart', () => { if(!isGamePaused) bird.flap(); });

    // --- Draw Pipes ---
    function drawPipes() {
        for (let i = 0; i < pipes.length; i++) {
            let p = pipes[i];

            if (pipeImg.complete && pipeImg.naturalWidth !== 0) {
                ctx.save();
                ctx.translate(p.x + pipeWidth / 2, p.top / 2);
                ctx.rotate(Math.PI);
                ctx.drawImage(pipeImg, -pipeWidth / 2, -p.top / 2, pipeWidth, p.top);
                ctx.restore();
            } else { 
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(p.x, 0, pipeWidth, p.top);
            }

            if (pipeImg.complete && pipeImg.naturalWidth !== 0) {
                ctx.drawImage(pipeImg, p.x, canvas.height - p.bottom, pipeWidth, p.bottom);
            } else {
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(p.x, canvas.height - p.bottom, pipeWidth, p.bottom);
            }
        }
    }

    // --- Update Pipes & Collision ---
    function updatePipes() {
        if (frames % spawnRate === 0) {
            let minHeight = 40; 
            let maxHeight = canvas.height - gap - minHeight; 
            
            let topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1) + minHeight);
            let bottomHeight = canvas.height - gap - topHeight;

            pipes.push({
                x: canvas.width,
                top: topHeight,
                bottom: bottomHeight,
                passed: false 
            });
        }

        for (let i = 0; i < pipes.length; i++) {
            pipes[i].x -= pipeSpeed;

            // Box Collider
            if (bird.x < pipes[i].x + pipeWidth &&
                bird.x + bird.width > pipes[i].x &&
                (bird.y < pipes[i].top || bird.y + bird.height > canvas.height - pipes[i].bottom)) {
                
                // Show Custom Pop-up
                isGamePaused = true;
                bgMusic.pause(); // BGM band
if (!isMuted) crashSound.play(); // Crash sound
                cancelAnimationFrame(gameLoopId); 
                
                if(typeof saveGameScore === "function") saveGameScore(score); 

                // Update text in popup
                document.getElementById('popupScoreDisplay').innerText = `Score: ${score} | Best: ${currentBest}`;
                
                // Make the overlay visible
                document.getElementById('gameOverOverlay').style.display = 'flex';
                return; 
            }

            // Score update logic
            if (pipes[i].x + pipeWidth < bird.x && !pipes[i].passed) {
                score++; 
                pipes[i].passed = true; 
                liveScoreText.innerText = `score : ${score}`; // Update HTML card
                              // --- NAYA: Real-time Best Score Update ---
                if (score > currentBest) {
                    currentBest = score; // Local variable update
                    bestScoreText.innerText = `best : ${currentBest}`; // Bottom scoreboard update
                }
                
                    if (score >= targetScore) {
        isGamePaused = true;
        bgMusic.pause(); // BGM band
if (!isMuted) winSound.play(); // Victory sound
        cancelAnimationFrame(gameLoopId); // Game rok do

        // Score update/save in Firebase
        if(typeof saveGameScore === "function") saveGameScore(score); 

        // Update Winner UI
        document.getElementById('winnerScoreDisplay').innerText = `Final Score: ${score}`;
        document.getElementById('winnerOverlay').style.display = 'flex';
        return; 
    }

            }

            if (pipes[i].x + pipeWidth < 0) {
                pipes.shift();
                i--; 
            }
        }
    }

    // --- Main Game Loop ---
    function loop() {
        if (isGamePaused) return;

        if (bgImg.complete && bgImg.naturalWidth !== 0) {
            bgX -= bgSpeed;
            if (bgX <= -canvas.width) bgX = 0;

            ctx.drawImage(bgImg, bgX, 0, canvas.width, canvas.height); 
            ctx.drawImage(bgImg, bgX + canvas.width, 0, canvas.width, canvas.height); 
        } else {
            ctx.fillStyle = "#235347";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        bird.update();
        updatePipes();
        drawPipes();
        bird.draw();
        
        frames++;
        gameLoopId = requestAnimationFrame(loop); 
    }

    // --- NAYA: Retry Function ---
    function retryGame() {
        // Hide the overlay
        document.getElementById('gameOverOverlay').style.display = 'none';

        // Reset Variables
        score = 0;
        frames = 0;
        pipes.length = 0; 
        bgX = 0;
        
        // Reset Bird Position
        bird.y = 250;
        bird.velocity = 0;

        // Reset UI Text
        liveScoreText.innerText = `score : ${score}`;
        playBtn.innerHTML = "&#10074;&#10074;"; 
        playText.innerText = "pause";

        // Restart Loop
        isGamePaused = false;
        loop();
    }
        // --- NAYA: Target Update Function ---
    function updateTarget() {
        let newTarget = parseInt(document.getElementById('customTargetInput').value);
        
        if (newTarget > 0) {
            targetScore = newTarget; // Target update kar diya
            // Bottom UI card mein target dikhana update karo
            document.querySelector('.card-bottom div:nth-child(2)').innerText = `Target : ${targetScore}`;
            
            // Custom alert dikhao aur button click sound bajao (agar function hain)
            if (typeof playClick === "function") playClick();
            if (typeof showCustomAlert === "function") {
                showCustomAlert(`Mitron! Naya target ${targetScore} set ho gaya hai.`);
            }
            
            // Menu automatically band kar do
            toggleMenu(); 
        } else {
            if (typeof showCustomAlert === "function") {
                showCustomAlert("Arre bhai, target 0 se bada hona chahiye!");
            }
        }
    }

        // --- NAYA: Menu aur Audio Logic ---
    let isMuted = false;
    const menuOverlay = document.getElementById('menuOverlay');
    const muteToggle = document.getElementById('muteToggle');

        function toggleMenu() {
        const gameOver = document.getElementById('gameOverOverlay');
        const winner = document.getElementById('winnerOverlay');

        // Agar menu pehle se khula hai, toh band karo
        if (menuOverlay.style.display === 'flex' || menuOverlay.style.display === 'block') {
            menuOverlay.style.display = 'none';
            
            // Menu band hone par game sirf tabhi resume hoga agar player out nahi hua hai
            // ya winner pop-up nahi khula hai.
            if (gameOver.style.display !== 'flex' && winner.style.display !== 'flex') {
                togglePlayPause(); 
            }
        } 
        // Agar menu band hai, toh kholo
        else {
            // Agar game chal raha hai, toh background mein pause kar do
            if (!isGamePaused) {
                togglePlayPause(); 
            }
            // Ab safely menu dikhao
            menuOverlay.style.display = 'flex'; 
        }
    }


   muteToggle.addEventListener('change', function() {
    isMuted = this.checked;

    if (isMuted) {
        bgMusic.pause(); // Turant music band
    } 
    else if (!isGamePaused) {
        bgMusic.play(); // Game chal raha ho toh wapas start
    }
});

    // Purane menuIcon click listener ko update karein
    menuIcon.addEventListener('click', toggleMenu);
    function retryGame() {
    // 1. Sabse pehle saare special sounds ko pause karo aur shuruat (0) par le jao
    crashSound.pause();  crashSound.currentTime = 0;
    winSound.pause();    winSound.currentTime = 0;

    // 2. Ab check karo agar mute nahi hai, toh BGM ko shuru se play karo
    if (!isMuted) {
        bgMusic.currentTime = 0; // Taaki music shuru se baje
        bgMusic.play();
    }

    // Sabhi overlays ko chhupao
    document.getElementById('gameOverOverlay').style.display = 'none';
    document.getElementById('winnerOverlay').style.display = 'none'; // Ye zaroori hai
    document.getElementById('menuOverlay').style.display = 'none';

    // ... baaki ka reset logic ...
    score = 0;
    frames = 0;
    pipes.length = 0;
    bgX = 0;
    bird.y = 250;
    bird.velocity = 0;
    liveScoreText.innerText = `score : ${score}`;
    isGamePaused = false;
    loop();
}
    // --- NAYA: Game UI Auto Update from Firebase ---
    auth.onAuthStateChanged(async (user) => {
        // Target Score ko HTML mein update karo
        document.querySelector('.card-bottom div:nth-child(2)').innerText = `Target : ${targetScore}`;
        
        if (user) {
            const profile = await getUserProfile();
            if (profile) {
                currentBest = profile.bestScore || 0;
                let avg = profile.averageScore || 0;
                
                // HTML UI elements mein data daalo
                bestScoreText.innerText = `best : ${currentBest}`;
                document.querySelector('.card-bottom div:nth-child(1)').innerText = `Average : ${parseFloat(avg).toFixed(1)}`;
            }
        }
    });



</script>
</body>
</html>
