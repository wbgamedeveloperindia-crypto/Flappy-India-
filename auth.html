<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Flappy India - Auth</title>
    <script src="click.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            background-image: url('texture.png');
            background-size: cover; background-position: center;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Arial', sans-serif; color: white;
        }

        .auth-card {
    width: 90%;
    max-width: 350px;
    padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .input-group { margin-bottom: 15px; text-align: left; position: relative; }
        
        input {
            width: 100%; padding: 12px; margin-top: 5px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px; color: white; box-sizing: border-box; outline: none;
        }

        .eye-icon { position: absolute; right: 15px; top: 38px; cursor: pointer; opacity: 0.7; }

        button {
            width: 100%; padding: 12px; margin-top: 15px; border: none;
            border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .main-btn { background: #ffcc00; color: #333; }
        .guest-btn { background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid white; }
        .toggle-link { margin-top: 15px; font-size: 14px; cursor: pointer; text-decoration: underline; }

        /* Hidden class for toggling */
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 id="formTitle">Login</h2>

    <div class="input-group hidden" id="usernameGroup">
        <label>Username</label>
        <input type="text" id="username" placeholder="Choose a unique username">
    </div>

    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
        <span class="eye-icon" onclick="togglePassword()">👁️</span>
    </div>

    <button class="main-btn" id="mainBtn" onclick="handleAuth()">Login</button>
    <button class="guest-btn" onclick="window.location.href='game.html'">Instant Play (Guest)</button>

    <div class="toggle-link" id="toggleLink" onclick="switchForm()">Don't have an account? Register</div>
</div>

<script>
    let isLoginMode = true;

    function togglePassword() {
        const passInput = document.getElementById('password');
        passInput.type = passInput.type === "password" ? "text" : "password";
    }

    function switchForm() {
        isLoginMode = !isLoginMode;
        document.getElementById('formTitle').innerText = isLoginMode ? "Login" : "Register";
        document.getElementById('mainBtn').innerText = isLoginMode ? "Login" : "Register";
        document.getElementById('toggleLink').innerText = isLoginMode ? 
            "Don't have an account? Register" : "Already have an account? Login";
        
        // Register mode mein username field dikhao, login mein chhupao
        document.getElementById('usernameGroup').classList.toggle('hidden', isLoginMode);
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const username = document.getElementById('username').value;

        if (!email || !pass || (!isLoginMode && !username)) {
            alert("Sari fields bharna zaroori hai!");
            return;
        }

        try {
            if (isLoginMode) {
                // auth.js: firebase.auth().signInWithEmailAndPassword(email, pass)
                await auth.signInWithEmailAndPassword(email, pass);
            } else {
                // auth.js logic for registration
                const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                const user = userCredential.user;

                // Firestore mein username save karna
                await db.collection('users').doc(user.uid).set({
                    username: username,
                    bestScore: 0,
                    gamesPlayed: 0,
                    totalScore: 0,
                    averageScore: 0,
                    joinDate: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            window.location.href = "game.html";
        } catch (error) {
            alert("Error: " + error.message);
        }
    }
</script>

</body>
</html>
