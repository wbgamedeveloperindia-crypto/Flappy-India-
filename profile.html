<!DOCTYPE html>
<html lang="en">
<head>

<script>
if (localStorage.getItem('flappy_access_granted') !== 'true') {
    window.location.href = 'index.html';
}
</script>

<meta name="viewport" content="width=device-width,
initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Flappy India - Profile</title>
    <script src="click.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>

    <style>
        body {
            margin: 0; padding: 0;
            background-image: url('texture.png');
            background-size: cover; background-position: center;
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Arial', sans-serif; color: white;
            padding: 20px 0;
        }

        .profile-card {
            width: 90%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px; padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
        }

        .logo-circle {
            width: 100px; height: 100px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid #ffcc00; border-radius: 50%;
            margin: 0 auto 10px; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .logo-circle img { width: 80%; height: 80%; object-fit: contain; }

        .game-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #ffcc00; }

        /* Stats Grid */
        .stats-container {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-bottom: 20px;
        }
        .stat-box { text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.8; }
        .stat-value { font-size: 18px; font-weight: bold; }

        /* Leaderboard Section */
        .leaderboard {
            background: rgba(255,255,255,0.05); border-radius: 15px;
            padding: 15px; margin-bottom: 20px; text-align: left;
        }
        .leaderboard h3 { margin: 0 0 10px 0; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px; }
        .leader-item { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            padding: 12px; border: none; border-radius: 10px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .dl-btn { background: #ffcc00; color: #333; }
        .logout-btn { background: rgba(255, 68, 68, 0.6); color: white; }
        .back-btn { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid white; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="logo-circle">
        <img src="logo.png" alt="Logo">
    </div>
    <div class="game-title">Flappy India</div>

    <h2 id="displayUsername">Loading...</h2>

    <div class="stats-container">
        <div class="stat-box">
            <div class="stat-label">Best Score</div>
            <div class="stat-value" id="bestScore">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Average</div>
            <div class="stat-value" id="avgScore">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Games Played</div>
            <div class="stat-value" id="gamesPlayed">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Total Score</div>
            <div class="stat-value" id="totalScore">0</div>
        </div>
    </div>

    <div class="leaderboard">
        <h3>Global Leaderboard (Top 10)</h3>
        <div id="leaderboardList">
            <div class="leader-item">Loading rankings...</div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn dl-btn" onclick="downloadAPK()">Download APK</button>
        <button class="btn back-btn" onclick="window.location.href='game.html'">Back to Game</button>
        <button class="btn logout-btn" onclick="logoutUser()">Logout</button>
    </div>
</div>

<script>
    // 1. Auth check: Agar login nahi hai toh auth.html pe bhej do
    auth.onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = "auth.html";
        } else {
            loadProfileData();
            loadLeaderboard();
        }
    });

    // 2. User ki stats load karna
    async function loadProfileData() {
        const data = await getUserProfile();
        if (data) {
            document.getElementById('displayUsername').innerText = data.username || "Player";
            document.getElementById('bestScore').innerText = data.bestScore || 0;
            document.getElementById('gamesPlayed').innerText = data.gamesPlayed || 0;
            document.getElementById('totalScore').innerText = data.totalScore || 0;
            
            let avg = data.averageScore || 0;
            document.getElementById('avgScore').innerText = parseFloat(avg).toFixed(1);
        }
    }

    // 3. Leaderboard load karna
    async function loadLeaderboard() {
        const board = await getGlobalLeaderboard();
        const listContainer = document.getElementById('leaderboardList');
        listContainer.innerHTML = ''; // Clear loading text

        if (board.length === 0) {
            listContainer.innerHTML = '<div class="leader-item">No records yet.</div>';
            return;
        }

        board.forEach((player, index) => {
            const item = document.createElement('div');
            item.className = 'leader-item';
            item.innerHTML = `
                <span>${index + 1}. ${player.username}</span>
                <span>${player.bestScore}</span>
            `;
            listContainer.appendChild(item);
        });
    }
</script>

</body>
</html>
