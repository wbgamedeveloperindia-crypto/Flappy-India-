<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffcc00">
    <link rel="icon" type="image/png" href="logo.png?v=2">
    <link rel="apple-touch-icon" href="logo.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">

    <title>Flappy India - Survival Gateway</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('texture.png');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Glassmorphism Main Gateway Card */
        .gateway-card {
            width: 90%;
            max-width: 380px;
            padding: 40px 15px 20px 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            text-align: center;
            position: relative;
            box-sizing: border-box;
            margin: 50px 0; /* Upar avatar ke liye space */
        }

        /* Top Yellow Avatar */
        .dev-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: #ffcc00;
            border: 3px solid #fff;
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            object-fit: contain;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* Developer Info */
        .dev-title {
            font-size: 20px;
            opacity: 0.8;
            margin-bottom: 2px;
        }
        .dev-name {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        /* Social Icons Row */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .social-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white;
            font-size: 11px;
            font-weight: bold;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .social-icon {
            width: 35px;
            height: 35px;
            margin-bottom: 5px;
            object-fit: contain; /* PNGs ko stretch hone se rokega */
            background: transparent;
        }

        /* Custom Colors for Icons (Fallback if images fail) */
        .ig-bg { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .wa-bg { background: #25D366; }
        .yt-bg { background: #FF0000; }
        .web-bg { background: #D4AF37; }

        /* Email Info */
        .email-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .email-icon { width: 20px; height: 20px; }

        /* Divider Line */
        .divider {
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            margin: 20px -15px; /* Cards ki edge tak stretch karne ke liye */
        }

        /* Bottom Section: Payment Gate */
        .payment-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        /* Left Side: QR & UPI */
        .qr-side {
            width: 55%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .qr-image {
            width: 100%;
            max-width: 150px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            margin-bottom: 10px;
        }
        .copy-box {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            padding: 8px;
            width: 90%;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .copy-tooltip {
            position: absolute;
            top: -25px;
            right: 0;
            background: black;
            color: white;
            padding: 2px 8px;
            font-size: 10px;
            border-radius: 5px;
        }

        /* Right Side: Inputs */
        .input-side {
            width: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .glass-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 5px;
            color: white;
            padding: 8px 5px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            outline: none;
            box-sizing: border-box;
        }
        .glass-input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .or-text { font-size: 16px; font-weight: bold; }
        
        .submit-btn {
            background: #ffcc00;
            color: #333;
            border: none;
            padding: 8px 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }

        /* Custom Alert CSS (Yahan bhi zaroori hai) */
        #customAlert {
            visibility: hidden;
            min-width: 250px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            color: white;
            text-align: center;
            border-radius: 15px;
            padding: 16px;
            position: fixed;
            z-index: 9999;
            left: 50%;
            bottom: 20px;
            transform: translateX(-50%);
            font-size: 15px;
            font-weight: bold;
            border: 2px solid #ffcc00;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            opacity: 0;
            transition: opacity 0.5s, bottom 0.5s ease-in-out;
        }
        #customAlert.show { visibility: visible; opacity: 1; bottom: 50px; }
        
        /* Waiting Overlay */
        #waitingOverlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            border-radius: 20px;
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #ffcc00;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    
    <script src="click.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="auth.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

      <script>
        if (localStorage.getItem('flappy_access_granted') === 'true') {
            window.location.href = 'auth.html';
        }
    </script>


</head>
<body>

    <div class="gateway-card">
        <img src="instagram.png" alt="Avatar" class="dev-avatar" onerror="this.src='https://via.placeholder.com/90/ffcc00/000?text=ME'">
        
        <div class="dev-title">developed by</div>
        <div class="dev-name">mallik.edittion</div>

        <div class="social-row">
            <a href="https://www.instagram.com/mallik.edittion?igsh=YXNwdm52OWxydnpz" class="social-item">
                <img src="Instagram_logo.png" alt="IG" class="social-icon" onerror="this.src='https://via.placeholder.com/35/333/fff?text=IG'">
                follow
            </a>
            <a href="https://wa.me/919239529167" class="social-item">
                <img src="Whatsapp_logo.png" alt="WA" class="social-icon" onerror="this.src='https://via.placeholder.com/35/333/fff?text=WA'">
                contact
            </a>
            <a href="https://youtube.com/@ayatserenity-t4i?si=dpMK9YT-tHVGSGfX" class="social-item">
                <img src="Youtube.png" alt="YT" class="social-icon" onerror="this.src='https://via.placeholder.com/35/333/fff?text=YT'">
                Subscribe
            </a>
            <a href="https://getversaindia-star.github.io/abdurrahmanmallik.com/" class="social-item">
                <img src="Web.png" alt="Web" class="social-icon" onerror="this.src='https://via.placeholder.com/35/333/fff?text=WEB'">
                visit
            </a>
        </div>


            <a href="mailto:wb.gamedeveloper.india@gmail.com" class="email-info" style="text-decoration: none; color: white; cursor: pointer;">
            <img src="Gmail.png" alt="Email" class="email-icon" style="width: 24px; height: 24px; object-fit: contain;" onerror="this.src='https://via.placeholder.com/24/333/fff?text=M'">
            wb.gamedeveloper.india@gmail.com
        </a>


        <div class="divider"></div>

        <div class="payment-section">
            <div class="qr-side">
                <img src="qr.png" alt="Scan to Pay" class="qr-image" onerror="this.src='https://via.placeholder.com/150/ffffff/000?text=QR+CODE'">
                <div class="copy-box" onclick="copyUPI()">
                    <span class="copy-tooltip">copy</span>
                    <span id="upiText">9239529167@fam</span>
                </div>
            </div>

            <div class="input-side">
                <input type="text" id="utrInput" class="glass-input" placeholder="UTR.........." maxlength="12">
                <div class="or-text">or</div>
                <input type="text" id="promoInput" class="glass-input" placeholder="promo......">
                <button class="submit-btn" onclick="verifyAccess()">Submit</button>
            </div>
        </div>
        
        <div id="waitingOverlay">
            <div class="spinner"></div>
            <p style="margin-top: 15px; font-weight: bold;">Verifying Payment...</p>
            <p style="font-size: 11px; opacity: 0.8;">Please wait for admin approval.</p>
        </div>
    </div>

    <div id="customAlert">Message yahan aayega</div>

    <script>
        // Copy UPI Function
        function copyUPI() {
            const upi = document.getElementById("upiText").innerText;
            navigator.clipboard.writeText(upi).then(() => {
                showCustomAlert("UPI ID Copied!");
                if (typeof playClick === "function") playClick();
            });
        }

        // Custom Alert Function (Agar click.js/auth.js mein load na ho paye)
        function showCustomAlert(message) {
            const alertBox = document.getElementById("customAlert");
            if (!alertBox) return;
            alertBox.innerText = message;
            alertBox.classList.add("show");
            setTimeout(() => { alertBox.classList.remove("show"); }, 3500);
        }

        // Main Verification Logic (Frontend Gate)
        async function verifyAccess() {
            const utr = document.getElementById("utrInput").value.trim();
            const promo = document.getElementById("promoInput").value.trim();
            const secretPromo = "MALLIK2027"; // 🚨 TUMHARA SECRET PROMO CODE YAHAN HAI 🚨

            if (typeof playClick === "function") playClick();

            // 1. Promo Code Check (Direct Access)
            if (promo !== "") {
                if (promo === secretPromo) {
                    showCustomAlert("Promo Accepted! Access Granted.");
                    localStorage.setItem('flappy_access_granted', 'true');
                    setTimeout(() => { window.location.href = 'auth.html'; }, 1500);
                } else {
                    showCustomAlert("Invalid Promo Code!");
                }
                return;
            }

            // 2. UTR Check (12 Digits Only)
            if (utr !== "") {
                if (utr.length === 12 && !isNaN(utr)) {
                    document.getElementById("waitingOverlay").style.display = "flex";
                    
                    // Call the function from auth.js to submit to Firebase
                    if (typeof submitUTR === "function") {
                        let success = await submitUTR(utr);
                        if (success) {
                            showCustomAlert("UTR Submitted! Waiting for approval...");
                            
                            // Start listening for admin approval
                            listenForApproval((status) => {
                                if (status === 'approved') {
                                    localStorage.setItem('flappy_access_granted', 'true');
                                    showCustomAlert("Payment Approved! Enjoy the game.");
                                    setTimeout(() => { window.location.href = 'auth.html'; }, 1500);
                                } else if (status === 'rejected') {
                                    document.getElementById("waitingOverlay").style.display = "none";
                                    document.getElementById("utrInput").value = "";
                                    showCustomAlert("Bhaiyon aur behno, UTR galat hai! Sahi UTR daaliye.");
                                }
                            });
                        } else {
                            document.getElementById("waitingOverlay").style.display = "none";
                            showCustomAlert("Network error! Try again.");
                        }
                    } else {
                        document.getElementById("waitingOverlay").style.display = "none";
                        alert("Backend Error: Please check auth.js setup.");
                    }
                } else {
                    showCustomAlert("UTR must be exactly 12 digits number!");
                }
                return;
            }

            showCustomAlert("Please enter UTR or Promo Code.");
        }

        // Service Worker (Puraana wala)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => { console.log('SW registered:', registration.scope); })
                    .catch(error => { console.log('SW registration failed:', error); });
            });
        }
    </script>
</body>
</html>
