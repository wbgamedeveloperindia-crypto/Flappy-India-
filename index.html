<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffcc00">
    <link rel="apple-touch-icon" href="logo.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Flappy India - Survive the Pillars & Fuck the world</title>
    <meta name="description" content="Experience Flappy India: A high-stakes survival awareness game. Navigate through 200 challenging pillars, climb the Global Leaderboard, and witness the reality of modern India. Compete with players worldwide for the top spot!">
    <meta name="keywords" content="Flappy India, India awareness game, 200 pillars game, Global Leaderboard, Flappy Bird India Edition, Indian Survival Game, Competitive Leaderboard India">
    <meta name="author" content="Flappy India Team">

    <meta property="og:title" content="Flappy India - Awareness & Survival Game">
    <meta property="og:description" content="Can you survive the 200 pillars? Join the mission, set high scores, and see your name on the Global Leaderboard.">
    <meta property="og:image" content="logo.png">
    <meta property="og:url" content="https://yourdomain.com">
<script src="click.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('texture.png'); /* Aapka special texture */
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* Glassmorphism Main Card */
        .index-card {
            width: 360px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
        }

        /* Top Logo Circle */
        .logo-container {
            width: 110px;
            height: 110px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid #ffcc00;
            border-radius: 50%;
            margin: -90px auto 20px; /* Card ke upar overlap karega */
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .logo-container img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .title {
            font-size: 36px;
            font-weight: 900;
            margin: 10px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .tagline {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.5;
            padding: 0 10px;
        }

        /* Enter Button Logic */
        .enter-btn-wrapper {
            position: relative;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .enter-btn-wrapper:hover {
            transform: scale(1.05);
        }

        .enter-img {
            width: 220px; /* Aapka neon ENTER button image */
            display: block;
        }

        .enter-text {
            margin-top: 10px;
            font-size: 16px;
            font-weight: bold;
            color: #ffcc00;
            text-transform: lowercase;
        }

        /* Footer Credits */
        .footer-info {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="index-card">
        <div class="logo-container">
            <img src="logo.png" alt="Flappy India Logo">
        </div>

        <div class="title">Flappy India</div>
        <p class="tagline">Survive the hurdles, witness the awareness, and dominate the Global Leaderboard.</p>

        <div class="enter-btn-wrapper" onclick="window.location.href='auth.html'">
            <img src="enter_btn.png" alt="Enter Game" class="enter-img" onerror="this.src='https://via.placeholder.com/220x80?text=ENTER+GAME'">
            <div class="enter-text">Enter the game</div>
        </div>

        <div class="footer-info">
            © 2026 Flappy India - Fucking shit donaal ka chaatne wala
        </div>
    </div>
        <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('Service Worker registered with scope:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>

</body>
</html>
